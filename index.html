<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>企客保险管理门户</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Restore route after GitHub Pages 404 fallback redirect.
      ;(() => {
        const params = new URLSearchParams(window.location.search)
        const encodedPath = params.get('p')
        if (!encodedPath) return
        const routePath = decodeURIComponent(encodedPath)
        const basePath = window.location.pathname.replace(/\/$/, '')
        const nextPath = routePath.startsWith('/') ? routePath : '/' + routePath
        window.history.replaceState(null, '', basePath + nextPath)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
